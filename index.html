<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            z-index: 1000; color: white; cursor: pointer;
        }

        #start-overlay h1 { font-size: 1.5rem; border: 1px solid white; padding: 15px 30px; border-radius: 30px; }
        
        #display-container { position: relative; width: 100vw; height: 100vh; display: none; overflow: hidden; }
        
        .photo-slide {
            position: absolute; width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 0.6s ease-in-out;
        }

        .photo-slide.active { 
            opacity: 1; 
            animation: zoomEffect 1.5s ease-out forwards;
        }

        @keyframes zoomEffect {
            from { transform: scale(1.2); }
            to { transform: scale(1); }
        }

        #love-message {
            position: absolute; width: 90%; text-align: center;
            color: #fff; font-size: 3rem; font-weight: bold;
            opacity: 0; transition: all 1.5s ease;
            text-shadow: 0 0 20px #ff0066; z-index: 100;
        }

        #love-message.show { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="beginAnimation()">
        <h1>TAP TO OPEN ❤️</h1>
    </div>

    <audio id="mySong">
        <source src="edit_song.mp3" type="audio/mpeg">
    </audio>

    <div id="display-container">
        <div id="photo-target"></div>
        <div id="love-message">I Love You</div>
    </div>

    <script>
        // List your photo names exactly as they appear in your 'images' folder
        const myPhotos = [
            'IMG-20250202-WA0146.jpg',
            'IMG-20240819-WA0066.jpg',
            '20251114_140908.jpg',
            '20251114_150200.jpg',
            'IMG-20230919-WA0004.jpg'
        ];

        const target = document.getElementById('photo-target');
        const song = document.getElementById('mySong');
        let currentIdx = 0;

        myPhotos.forEach((url, index) => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'photo-slide';
            img.id = 'slide-' + index;
            target.appendChild(img);
        });

        function beginAnimation() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('display-container').style.display = 'flex';
            document.getElementById('display-container').style.justifyContent = 'center';
            document.getElementById('display-container').style.alignItems = 'center';
            song.play();
            nextSlide();
        }

        function nextSlide() {
            if (currentIdx < myPhotos.length) {
                if (currentIdx > 0) {
                    document.getElementById('slide-' + (currentIdx - 1)).style.opacity = '0';
                }
                document.getElementById('slide-' + currentIdx).classList.add('active');
                currentIdx++;
                setTimeout(nextSlide, 1300); 
            } else {
                document.getElementById('slide-' + (myPhotos.length - 1)).style.filter = 'brightness(0.3)';
                document.getElementById('love-message').classList.add('show');
            }
        }
    </script>
</body>
</html>
